name: Refresh standards radar
on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - env:
          JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
        run: node scripts/refresh.mjs
      - run: |
          git config user.name "radar-bot"
          git config user.email "actions@github.com"
          git add public/data/changes.json data/snapshots
          git commit -m "data: standards refresh $(date -u +%Y-%m-%d)" || echo "No changes"
          git push
